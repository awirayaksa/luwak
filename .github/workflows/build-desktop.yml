name: Build Desktop App

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: luwak-x86_64-pc-windows-msvc.exe
            portable_suffix: win-x64
          - platform: macos-latest
            target: aarch64-apple-darwin
            artifact_name: luwak-aarch64-apple-darwin
            portable_suffix: macos-arm64
          - platform: macos-13
            target: x86_64-apple-darwin
            artifact_name: luwak-x86_64-apple-darwin
            portable_suffix: macos-x64
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact_name: luwak-x86_64-unknown-linux-gnu
            portable_suffix: linux-x64

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev

      - name: Build sidecar binary
        run: |
          bun build --compile src/index.ts --outfile "src-tauri/binaries/${{ matrix.artifact_name }}${{ matrix.platform == 'windows-latest' && '.exe' || '' }}"

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Luwak ${{ github.ref_name }}"
          releaseBody: "Desktop application release for Luwak ${{ github.ref_name }}"
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}

      - name: Build portable package
        run: node scripts/build-portable.mjs --target ${{ matrix.target }}

      - name: Rename portable package
        shell: bash
        run: |
          mv "src-tauri/target/release/bundle/portable/Luwak-portable.zip" \
             "src-tauri/target/release/bundle/portable/Luwak-portable-${{ matrix.portable_suffix }}.zip"

      - name: Upload portable to release
        uses: softprops/action-gh-release@v2
        with:
          files: src-tauri/target/release/bundle/portable/Luwak-portable-${{ matrix.portable_suffix }}.zip
          tag_name: ${{ github.ref_name }}
