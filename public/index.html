<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>luwak</title>
<link rel="icon" href="/assets/favicon.ico" />
<link rel="icon" type="image/svg+xml" href="/assets/luwak-icon.svg" />
<style>
  /* Coffee brand palette — "espresso" (dark, default) + "latte" (light). */
  :root {
    color-scheme: dark;
    --bg: #1B0F08; --panel: #23140C; --raised: #2C1B10; --border: #3C2618;
    --text: #F7E9D2; --muted: #9C7A57;
    --accent: #EAA53F; --accent-strong: #FFD884; --accent-soft: #EAA53F22;
    --ok: #FFD884;
    --danger: #E5634D; --danger-soft: #E5634D33;
    --hover: #2C1B1066; --active-bg: #EAA53F1f;
    --user: #E6CBA4; --user-soft: #E6CBA433;
    --assistant: #FFD884; --assistant-soft: #EAA53F2e;
    --tool: #E3B341; --tool-soft: #BB800933;
    --thinking: #C9A6E0; --thinking-bg: #271a2b;
    --tint-call: #2a1d0c; --tint-result: #16210f;
    --mark-bg: #EAA53F55; --shadow: 0 10px 34px #000a;
  }
  :root[data-theme="latte"] {
    color-scheme: light;
    --bg: #F4E3C8; --panel: #EFD8B6; --raised: #FBF1DD; --border: #D9BE97;
    --text: #2C1B10; --muted: #6B5236;
    --accent: #B9741A; --accent-strong: #C57C20; --accent-soft: #C57C2022;
    --ok: #1A7F37;
    --danger: #B23A28; --danger-soft: #B23A2826;
    --hover: #00000008; --active-bg: #C57C201f;
    --user: #7A5A33; --user-soft: #C9A06633;
    --assistant: #9A5E10; --assistant-soft: #C57C2026;
    --tool: #9A6B12; --tool-soft: #C9A06633;
    --thinking: #6E4B8A; --thinking-bg: #EBDFC2;
    --tint-call: #F3E2BE; --tint-result: #E9EBCB;
    --mark-bg: #E9B14a99; --shadow: 0 10px 30px #4a2f1330;
  }
  :root[data-theme="github"] {
    color-scheme: dark;
    --bg: #0e1116; --panel: #161b22; --raised: #161b22; --border: #2a313c;
    --text: #d7dde5; --muted: #768390;
    --accent: #1f6feb; --accent-strong: #58a6ff; --accent-soft: #1f6feb22;
    --ok: #3fb950;
    --danger: #f85149; --danger-soft: #f8514933;
    --hover: #161b22; --active-bg: #1f6feb22;
    --user: #79c0ff; --user-soft: #1f6feb33;
    --assistant: #56d364; --assistant-soft: #3fb95033;
    --tool: #e3b341; --tool-soft: #bb800933;
    --thinking: #b39ddb; --thinking-bg: #1c1a2b;
    --tint-call: #20180e; --tint-result: #0e1a14;
    --mark-bg: #bb800966; --shadow: 0 8px 30px #000a;
  }
  :root[data-theme="snow"] {
    color-scheme: light;
    --bg: #ffffff; --panel: #f6f8fa; --raised: #f6f8fa; --border: #d0d7de;
    --text: #1f2328; --muted: #656d76;
    --accent: #0969da; --accent-strong: #0550ae; --accent-soft: #0969da14;
    --ok: #1a7f37;
    --danger: #cf222e; --danger-soft: #cf222e1a;
    --hover: #eaeef2; --active-bg: #0969da14;
    --user: #0550ae; --user-soft: #ddf4ff;
    --assistant: #116329; --assistant-soft: #dafbe1;
    --tool: #7d4e00; --tool-soft: #fff8c5;
    --thinking: #6639ba; --thinking-bg: #faf5ff;
    --tint-call: #fff8e8; --tint-result: #eafaef;
    --mark-bg: #fae17d; --shadow: 0 10px 30px #1f23281f;
  }
  :root[data-theme="matrix"] {
    color-scheme: dark;
    --bg: #000000; --panel: #030a03; --raised: #061206; --border: #1a3a1a;
    --text: #33ff66; --muted: #2a8a44;
    --accent: #00ff41; --accent-strong: #7dffaf; --accent-soft: #00ff4122;
    --ok: #00ff41;
    --danger: #ff5c5c; --danger-soft: #ff5c5c33;
    --hover: #06120688; --active-bg: #00ff411f;
    --user: #7dffaf; --user-soft: #7dffaf33;
    --assistant: #00ff41; --assistant-soft: #00ff412e;
    --tool: #33cc55; --tool-soft: #33cc5533;
    --thinking: #99ffcc; --thinking-bg: #07140e;
    --tint-call: #071407; --tint-result: #07140b;
    --mark-bg: #00ff4177; --shadow: 0 10px 34px #000a;
  }
  * { box-sizing: border-box; }
  body { margin: 0; font: 13px/1.5 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
         background: var(--bg); color: var(--text); height: 100vh; display: grid;
         grid-template-columns: 400px 1fr; grid-template-rows: auto 1fr; }
  header { grid-column: 1 / -1; padding: 8px 14px; background: var(--panel);
           border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
  header .logo { width: 24px; height: 24px; display: block; }
  header b { color: var(--text); font-size: 15px; letter-spacing: .02em; }
  header .grow { flex: 1; }
  input[type=search] { flex: 1; background: var(--bg); color: var(--text); border: 1px solid var(--border);
           border-radius: 7px; padding: 5px 10px; font: inherit; }
  input[type=search]::placeholder { color: var(--muted); }
  input[type=search]:focus { outline: none; border-color: var(--accent); }
  button { background: var(--raised); color: var(--text); border: 1px solid var(--border); border-radius: 7px;
           padding: 4px 10px; cursor: pointer; font: inherit; transition: background .12s, border-color .12s; }
  button:hover { border-color: var(--accent); }
  button.active { background: var(--accent); color: #23140C; border-color: var(--accent); font-weight: 600; }
  select { background: var(--raised); color: var(--text); border: 1px solid var(--border); border-radius: 7px;
           padding: 4px 8px; font: inherit; cursor: pointer; }
  select:hover { border-color: var(--accent); }
  select:focus { outline: none; border-color: var(--accent); }
  #list { overflow: auto; min-height: 0; border-right: 1px solid var(--border); }
  .row { padding: 8px 12px; border-bottom: 1px solid var(--border); cursor: pointer; }
  .row:hover { background: var(--hover); }
  .row.active { background: var(--active-bg); border-left: 3px solid var(--accent); padding-left: 9px; }
  .row .top { display: flex; justify-content: space-between; gap: 8px; }
  .row .method { color: var(--accent); }
  .row .status-2 { color: var(--ok); } .row .status-4, .row .status-5 { color: var(--danger); }
  .row .path, .row .ttl { color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .row .ttl { font-size: 13px; color: var(--text); margin-bottom: 2px; }
  .row .meta { color: var(--muted); font-size: 11px; }
  .row .snip { color: var(--text); font-size: 12px; }
  .row .snip mark { background: var(--mark-bg); color: var(--text); border-radius: 3px; }
  .tag { font-size: 10px; padding: 0 5px; border-radius: 8px; background: var(--border); color: var(--muted); }
  .tag.stream { background: var(--accent-soft); color: var(--accent); }
  .tag.partial, .tag.branch { background: var(--danger-soft); color: var(--danger); }
  #detail { overflow: auto; min-height: 0; padding: 14px; }
  #detail .empty { color: var(--muted); margin-top: 40px; text-align: center; }
  /* Brand splash shown on the empty/welcome panel. */
  .welcome { display: flex; flex-direction: column; align-items: center; justify-content: center;
             height: 100%; color: var(--muted); gap: 14px; }
  .welcome img { width: min(360px, 60%); height: auto; opacity: .92; }
  .tabs { display: flex; gap: 6px; margin-bottom: 10px; flex-wrap: wrap; }
  .tabs .spacer { flex: 1; }
  h3 { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: .05em; margin: 14px 0 6px; }
  pre { background: var(--raised); border: 1px solid var(--border); border-radius: 7px; padding: 10px;
        white-space: pre-wrap; word-break: break-word; overflow-x: auto; margin: 0; }
  .kv { color: var(--muted); } .kv b { color: var(--text); font-weight: normal; }
  .msg { border: 1px solid var(--border); border-radius: 9px; margin-bottom: 8px; overflow: hidden; }
  .msg .hd { padding: 4px 10px; background: var(--panel); display: flex; gap: 8px; align-items: center; }
  .role { font-size: 10px; padding: 1px 7px; border-radius: 8px; text-transform: uppercase; letter-spacing: .04em; }
  .role.system { background: var(--border); color: var(--text); }
  .role.user { background: var(--user-soft); color: var(--user); }
  .role.assistant { background: var(--assistant-soft); color: var(--assistant); }
  .role.tool { background: var(--tool-soft); color: var(--tool); }
  .src { color: var(--muted); font-size: 11px; }
  .marker { font-size: 10px; color: var(--danger); border: 1px solid var(--danger-soft); border-radius: 8px; padding: 1px 6px; }
  .part { padding: 8px 10px; border-top: 1px solid var(--border); white-space: pre-wrap; word-break: break-word; }
  .part.md { white-space: normal; }
  .part .pt { color: var(--muted); font-size: 10px; text-transform: uppercase; margin-bottom: 3px; }
  .part.thinking { background: var(--thinking-bg); } .part.thinking .pt { color: var(--thinking); }
  .part.tool_call { background: var(--tint-call); } .part.tool_call .pt { color: var(--tool); }
  .part.tool_result { background: var(--tint-result); } .part.tool_result .pt { color: var(--accent); }
  /* Rendered-markdown response parts (Threads · resp · pretty · md). */
  .part.md { white-space: normal; }
  .part.md > :first-child { margin-top: 0; }
  .part.md > :last-child { margin-bottom: 0; }
  .part.md p { margin: 0 0 8px; white-space: pre-wrap; word-break: break-word; }
  .part.md h1, .part.md h2, .part.md h3, .part.md h4, .part.md h5, .part.md h6 {
    color: var(--text); text-transform: none; letter-spacing: 0; margin: 14px 0 6px; line-height: 1.3; }
  .part.md h1.md-h { font-size: 17px; } .part.md h2.md-h { font-size: 15px; }
  .part.md h3.md-h { font-size: 14px; } .part.md h4.md-h, .part.md h5.md-h, .part.md h6.md-h { font-size: 13px; }
  .part.md ul, .part.md ol { margin: 0 0 8px; padding-left: 22px; }
  .part.md li { margin: 2px 0; }
  .part.md code { background: var(--raised); border: 1px solid var(--border); border-radius: 4px; padding: 0 4px; }
  .part.md pre.md-pre { background: var(--raised); border: 1px solid var(--border); border-radius: 7px;
    padding: 10px; margin: 0 0 8px; white-space: pre-wrap; word-break: break-word; overflow-x: auto; }
  .part.md pre.md-pre code { background: none; border: 0; padding: 0; }
  .part.md blockquote { margin: 0 0 8px; padding: 2px 0 2px 10px; border-left: 3px solid var(--border); color: var(--muted); }
  .part.md a { color: var(--accent); }
  .part.md strong { color: var(--text); font-weight: 600; }
  .part.md hr { border: 0; border-top: 1px solid var(--border); margin: 12px 0; }
  #live { position: fixed; bottom: 16px; right: 16px; width: 460px; max-height: 320px; overflow: auto;
          background: var(--panel); border: 1px solid var(--accent); border-radius: 12px; box-shadow: var(--shadow);
          padding: 10px 12px; display: none; z-index: 10; }
  #live.on { display: block; }
  #live .lhd { color: var(--accent); font-size: 11px; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 6px;
               display: flex; align-items: center; gap: 6px; }
  #live .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent-strong); animation: pulse 1s infinite; }
  @keyframes pulse { 50% { opacity: .3; } }
  #live pre { background: transparent; border: 0; padding: 0; max-height: 260px; }
  #modal-bg { position: fixed; inset: 0; background: #0008; display: none; align-items: center; justify-content: center; z-index: 100; }
  #modal-bg.on { display: flex; }
  #modal { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; box-shadow: var(--shadow);
           padding: 20px 24px; max-width: 400px; text-align: center; }
  #modal .modal-msg { color: var(--text); margin: 0 0 18px; line-height: 1.5; }
  #modal .modal-btns { display: flex; gap: 10px; justify-content: center; }
  #modal button { min-width: 90px; }
  #modal .btn-danger { background: var(--danger); color: #fff; border-color: var(--danger); }
  #modal .btn-danger:hover { border-color: var(--danger); filter: brightness(1.1); }
</style>
</head>
<body>
  <header>
    <img class="logo" src="/assets/luwak-mark.svg" alt="" />
    <b>Luwak</b>
    <button id="m-feed" onclick="setMode('feed')">Feed</button>
    <button id="m-threads" onclick="setMode('threads')">Threads</button>
    <input id="q" type="search" placeholder="search messages (FTS)…" />
    <button onclick="doSearch()">search</button>
    <button onclick="refresh()">↻</button>
    <button onclick="clearCaptures()" title="Delete all captured traffic" style="border-color:var(--danger);color:var(--danger)">clear</button>
    <select id="theme-select" onchange="setTheme(this.value)" title="Theme">
      <option value="espresso">☕ Espresso</option>
      <option value="latte">🥛 Latte</option>
      <option value="github">🌙 GitHub Dark</option>
      <option value="snow">☀ Snow</option>
      <option value="matrix">🟢 Matrix</option>
    </select>
  </header>
  <div id="list"></div>
  <div id="detail"><div class="welcome"><img src="/assets/luwak-logo.png" alt="luwak — llm proxy · log viewer" /><div>Select a thread.</div></div></div>
  <div id="live"></div>
  <div id="modal-bg">
    <div id="modal">
      <p class="modal-msg" id="modal-msg"></p>
      <div class="modal-btns">
        <button onclick="closeModal()">Cancel</button>
        <button class="btn-danger" id="modal-confirm">Confirm</button>
      </div>
    </div>
  </div>

<script>
// --- Theme — espresso (warm dark, default) · latte (warm light) ·
//     github (cold dark) · snow (white light) · matrix (green CRT). Persisted to localStorage. ---
const THEMES = ["espresso", "latte", "github", "snow", "matrix"];
function applyTheme(t) {
  if (!THEMES.includes(t)) t = "espresso";
  if (t === "espresso") delete document.documentElement.dataset.theme; // espresso = :root default
  else document.documentElement.dataset.theme = t;
  const sel = document.getElementById("theme-select");
  if (sel) sel.value = t;
}
function setTheme(t) { localStorage.setItem("luwak-theme", t); applyTheme(t); }
applyTheme(localStorage.getItem("luwak-theme") || "espresso");

let mode = "feed";
let threads = [], rows = [], hits = [];
let activeThread = null, thread = null;
let activeId = null, detail = null, messages = [], tab = "parsed", pretty = true, feedHl = "";

// Composable lenses for the conversation view; applied as a pipeline.
let lens = { scope: "both", roles: { system: true, user: true, assistant: true, tool: true }, highlight: "", filterOut: "", raw: false, markdown: false };

// Markdown rendering only makes sense for the assistant's prose, so it's
// offered only when isolating the response in pretty mode.
const mdActive = () => lens.scope === "response" && !lens.raw && lens.markdown;

const $ = (id) => document.getElementById(id);
const welcome = (msg) => `<div class="welcome"><img src="/assets/luwak-logo.png" alt="luwak — llm proxy · log viewer" /><div>${msg}</div></div>`;
const cls = (s) => "status-" + String(s)[0];
const when = (ms) => new Date(ms).toLocaleString();
const esc = (s) => String(s).replace(/[&<>]/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;" }[c]));

function setMode(m) { mode = m; activeThread = null; activeId = null; refresh(); }

function openModal(msg, onConfirm) {
  $("modal-msg").textContent = msg;
  $("modal-bg").classList.add("on");
  const btn = $("modal-confirm");
  const handler = () => { btn.removeEventListener("click", handler); closeModal(); onConfirm(); };
  btn.addEventListener("click", handler);
}
function closeModal() { $("modal-bg").classList.remove("on"); }

async function clearCaptures() {
  openModal("Delete all captured proxy traffic? This cannot be undone.", async () => {
    await fetch("/api/exchanges", { method: "DELETE" });
    activeThread = null; activeId = null; thread = null; detail = null; messages = [];
    refresh();
  });
}

async function refresh() {
  $("m-threads").classList.toggle("active", mode === "threads");
  $("m-feed").classList.toggle("active", mode === "feed");
  if (mode === "threads") {
    threads = await (await fetch("/api/threads")).json();
    renderList();
    const keep = activeThread && threads.some(t => t.id === activeThread) ? activeThread : threads[0]?.id;
    if (keep) showThread(keep);
    else $("detail").innerHTML = welcome("No threads yet.");
  } else if (mode === "feed") {
    rows = await (await fetch("/api/exchanges")).json();
    renderList();
    const keep = activeId && rows.some(r => r.id === activeId) ? activeId : rows[0]?.id;
    if (keep) select(keep);
    else $("detail").innerHTML = welcome("No exchanges yet.");
  } else {
    renderList();
  }
}

async function doSearch() {
  const q = $("q").value.trim();
  if (!q) return;
  hits = await (await fetch("/api/search?q=" + encodeURIComponent(q))).json();
  mode = "search";
  $("m-threads").classList.remove("active"); $("m-feed").classList.remove("active");
  renderList();
}
$("q").addEventListener("keydown", e => { if (e.key === "Enter") doSearch(); });

function renderList() {
  const el = $("list");
  if (mode === "threads") {
    el.innerHTML = threads.map(t => `
      <div class="row ${t.id === activeThread ? "active" : ""}" onclick="showThread(${t.id})">
        <div class="ttl">${esc(t.title || "(no user text)")}</div>
        <div class="meta">#${t.id} · ${esc(t.model || t.provider_id)} · ${t.exchange_count} turns · ${when(t.started_ts)}</div>
      </div>`).join("");
  } else if (mode === "feed") {
    el.innerHTML = rows.map(r => `
      <div class="row ${r.id === activeId ? "active" : ""}" onclick="select(${r.id})">
        <div class="top"><span><span class="method">${r.method}</span> <span class="${cls(r.status)}">${r.status}</span></span>
          <span class="meta">${new Date(r.ts_start).toLocaleTimeString()}</span></div>
        <div class="path" title="${r.req_path}">${r.req_path}</div>
        <div class="meta">${r.provider_id}
          ${r.is_streaming ? '<span class="tag stream">stream</span>' : ""}
          ${r.incomplete ? '<span class="tag partial">partial</span>' : ""}
          · ${(r.resp_bytes/1024).toFixed(1)}kB</div>
      </div>`).join("");
  } else {
    el.innerHTML = hits.length ? hits.map(h => `
      <div class="row" onclick="openExchange(${h.exchange_id})">
        <div class="top"><span class="role ${h.role}">${h.role}</span><span class="meta">#${h.exchange_id} ${h.source}</span></div>
        <div class="snip">${esc(h.snippet).replace(/\[/g,"<mark>").replace(/\]/g,"</mark>")}</div>
      </div>`).join("") : '<div class="row meta">no matches</div>';
  }
}

// --- Thread (conversation) view ---
async function showThread(id) {
  activeThread = id;
  renderList();
  thread = await (await fetch("/api/threads/" + id)).json();
  renderThread();
}

function hl(text, h) {
  const e = esc(text);
  h = h ?? lens.highlight;
  if (!h) return e;
  const re = new RegExp(h.replace(/[.*+?^${}()|[\]\\]/g, "\\$&"), "gi");
  return e.replace(re, m => "<mark>" + m + "</mark>");
}

function renderPart(p, useLens, hlText) {
  if (useLens && lens.raw) return `<div class="part ${p.type}"><div class="pt">${p.type}</div>${esc(JSON.stringify(p))}</div>`;
  let inner, md = "";
  const h = hlText !== undefined ? hlText : (useLens ? lens.highlight : "");
  if (p.type === "text" || p.type === "thinking") {
    // Markdown wins over highlight: rendered HTML and <mark> injection don't mix.
    if (useLens && mdActive()) { inner = renderMarkdown(p.text || ""); md = " md"; }
    else inner = h ? hl(p.text || "", h) : esc(p.text || "");
  }
  else if (p.type === "tool_call") inner = esc(p.name) + "(" + esc(JSON.stringify(p.args)).replace(/\\n/g, "\n") + ")";
  else if (p.type === "tool_result") inner = esc(JSON.stringify(p.content)).replace(/\\n/g, "\n");
  else if (p.type === "image") inner = esc("[image " + p.ref + "]");
  else inner = esc(JSON.stringify(p.raw ?? p)).replace(/\\n/g, "\n");
  return `<div class="part ${p.type}${md}"><div class="pt">${p.type}</div>${inner}</div>`;
}

// Minimal, self-contained Markdown -> HTML for assistant prose. Escapes first,
// then applies a safe subset (no raw HTML passthrough); links open in a new tab.
// Fenced code is split out structurally so inline rules never touch it.
function renderMarkdown(src) {
  return String(src)
    .split(/(```[^\n]*\n?[\s\S]*?```)/)
    .map((seg) => {
      const fence = seg.match(/^```[^\n]*\n?([\s\S]*?)```$/);
      if (fence) return `<pre class="md-pre"><code>${esc(fence[1].replace(/\n$/, ""))}</code></pre>`;
      return renderMdBlocks(seg);
    })
    .join("");
}

function renderMdBlocks(src) {
  const inline = (t) => esc(t)
    .replace(/`([^`]+)`/g, "<code>$1</code>")
    .replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>")
    .replace(/__([^_]+)__/g, "<strong>$1</strong>")
    .replace(/(^|[^*])\*([^*\s][^*]*?)\*/g, "$1<em>$2</em>")
    .replace(/~~([^~]+)~~/g, "<del>$1</del>")
    .replace(/\[([^\]]+)\]\((https?:[^)\s]+)\)/g, '<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>');
  const out = [];
  let list = null; // "ul" | "ol" | null
  const closeList = () => { if (list) { out.push(`</${list}>`); list = null; } };
  for (const line of src.split(/\r?\n/)) {
    let m;
    if (/^\s*$/.test(line)) { closeList(); }
    else if (m = line.match(/^\s*(#{1,6})\s+(.*)$/)) { closeList(); const n = m[1].length; out.push(`<h${n} class="md-h">${inline(m[2].trim())}</h${n}>`); }
    else if (/^\s*([-*_])(\s*\1){2,}\s*$/.test(line)) { closeList(); out.push("<hr/>"); }
    else if (m = line.match(/^\s*[-*+]\s+(.*)$/)) { if (list !== "ul") { closeList(); out.push("<ul>"); list = "ul"; } out.push(`<li>${inline(m[1])}</li>`); }
    else if (m = line.match(/^\s*\d+\.\s+(.*)$/)) { if (list !== "ol") { closeList(); out.push("<ol>"); list = "ol"; } out.push(`<li>${inline(m[1])}</li>`); }
    else if (m = line.match(/^\s*>\s?(.*)$/)) { closeList(); out.push(`<blockquote>${inline(m[1])}</blockquote>`); }
    else { closeList(); out.push(`<p>${inline(line)}</p>`); }
  }
  closeList();
  return out.join("\n");
}

function itemText(c) { return c.parts.map(p => p.text ?? JSON.stringify(p)).join(" "); }

function applyLens(items) {
  const fo = lens.filterOut.toLowerCase();
  return items.filter(c =>
    (lens.scope === "both" || c.source === lens.scope) &&
    lens.roles[c.role] &&
    !(fo && itemText(c).toLowerCase().includes(fo)));
}

const roleBtn = (r) => `<button class="${lens.roles[r] ? "active" : ""}" onclick="lens.roles['${r}']=!lens.roles['${r}'];renderThread()">${r}</button>`;
const scopeBtn = (s, label) => `<button class="${lens.scope === s ? "active" : ""}" onclick="lens.scope='${s}';renderThread()">${label}</button>`;

function renderThread() {
  const t = thread; if (!t) return;
  const branchy = t.exchanges.filter(e => e.relation === "branch").length;
  $("detail").innerHTML = `
    <div class="kv">thread <b>#${t.id}</b> · ${esc(t.model || "?")} · ${t.exchanges.length} exchanges
      · ${t.conversation.length} deduped messages
      ${branchy ? `· <span class="marker">${branchy} branch/compaction</span>` : ""}</div>
    <div class="tabs" style="margin-top:10px">
      ${scopeBtn("both", "both")}${scopeBtn("request", "req")}${scopeBtn("response", "resp")}
      <span style="width:8px"></span>
      ${roleBtn("system")}${roleBtn("user")}${roleBtn("assistant")}${roleBtn("tool")}
      <span style="width:8px"></span>
      <button class="${lens.raw ? "active" : ""}" onclick="lens.raw=!lens.raw;renderThread()">${lens.raw ? "raw" : "pretty"}</button>
      ${lens.scope === "response" && !lens.raw
        ? `<button class="${lens.markdown ? "active" : ""}" onclick="lens.markdown=!lens.markdown;renderThread()" title="Render the response as formatted Markdown">md</button>`
        : ""}
      <input id="hl" type="search" placeholder="highlight…" value="${esc(lens.highlight)}"
             style="flex:0 1 140px" oninput="lens.highlight=this.value;renderConv()" />
      <input id="fo" type="search" placeholder="filter-out…" value="${esc(lens.filterOut)}"
             style="flex:0 1 140px" oninput="lens.filterOut=this.value;renderConv()" />
    </div>
    <div id="conv"></div>`;
  renderConv();
}

function renderConv() {
  const items = applyLens(thread.conversation);
  $("conv").innerHTML = items.length ? items.map(c => `
    <div class="msg">
      <div class="hd">
        <span class="role ${c.role}">${c.role}</span>
        <span class="src">${c.source} · #${c.exchangeId}</span>
        ${c.marker ? `<span class="marker">⚠ ${esc(c.marker)}</span>` : ""}
      </div>
      ${c.parts.map(p => renderPart(p, true)).join("")}
    </div>`).join("") : '<div class="empty">No messages match the current lenses.</div>';
}

// --- Feed (raw exchange) view ---
function openExchange(id) { mode = "feed"; tab = "parsed"; renderList(); select(id); }

async function select(id) {
  activeId = id;
  if (mode === "feed") renderList();
  detail = await (await fetch("/api/exchanges/" + id)).json();
  messages = await (await fetch("/api/exchanges/" + id + "/messages")).json();
  renderDetail();
}

function fmt(body) { if (!pretty) return body; try { return JSON.stringify(JSON.parse(body), null, 2); } catch { return body; } }

function renderDetail() {
  const e = detail; if (!e) return;
  $("detail").innerHTML = `
    <div class="tabs">
      <button class="${tab==='parsed'?'active':''}" onclick="tab='parsed';renderDetail()">Parsed</button>
      <button class="${tab==='request'?'active':''}" onclick="tab='request';renderDetail()">Request</button>
      <button class="${tab==='response'?'active':''}" onclick="tab='response';renderDetail()">Response</button>
      <span class="spacer"></span>
      <button onclick="window.open('/api/exchanges/' + detail.id + '/export')">export ⤓</button>
      ${tab!=='parsed' ? `<button class="${pretty?'active':''}" onclick="pretty=!pretty;renderDetail()">${pretty?'pretty':'raw'}</button>` : ""}
      <input id="fhl" type="search" placeholder="highlight…" value="${esc(feedHl)}"
             style="flex:0 1 140px" oninput="feedHl=this.value;renderFeedMain()" />
    </div>
    <div id="feed-main"></div>`;
  renderFeedMain();
}

function renderFeedMain() {
  const e = detail; if (!e) return;
  let main;
  if (tab === "parsed") {
    main = messages.length ? messages.map(m => `
      <div class="msg"><div class="hd"><span class="role ${m.role}">${m.role}</span><span class="src">${m.source} · #${m.seq}</span></div>
        ${m.parts.map(p => renderPart(p, false, feedHl)).join("")}</div>`).join("")
      : '<div class="empty">No normalized messages.</div>';
  } else {
    const headers = tab === "request" ? e.req_headers : e.resp_headers;
    const body = tab === "request" ? e.req_body : e.resp_body;
    main = `
      <div class="kv"><b>${e.method}</b> ${esc(e.upstream_url)}<br/>
        status <b>${e.status}</b> · ${e.ts_end - e.ts_start}ms
        ${e.is_streaming ? "· " + (e.chunk_timings?.length || 0) + " chunks" : ""}
        ${e.incomplete ? '· <span style="color:#ff7b72">incomplete</span>' : ""}</div>
      <h3>Headers</h3><pre>${hl(Object.entries(headers).map(([k,v]) => k + ": " + v).join("\n"), feedHl)}</pre>
      <h3>Body</h3><pre>${hl(fmt(body), feedHl)}</pre>`;
  }
  $("feed-main").innerHTML = main;
}

// --- Live tail (SSE) ---
const liveStreams = {};
function extractDelta(sse) {
  let out = "";
  for (const line of sse.split(/\r?\n/)) {
    if (!line.startsWith("data:")) continue;
    const j = line.slice(5).trim();
    if (!j || j === "[DONE]") continue;
    try {
      const o = JSON.parse(j);
      if (typeof o.delta?.text === "string") out += o.delta.text;          // anthropic text_delta
      else if (typeof o.delta?.thinking === "string") out += o.delta.thinking;
      const c = o.choices?.[0]?.delta?.content;                            // openai
      if (typeof c === "string") out += c;
    } catch { /* partial/keepalive */ }
  }
  return out;
}
function renderLive() {
  const ids = Object.keys(liveStreams);
  const el = $("live");
  if (!ids.length) { el.classList.remove("on"); return; }
  el.classList.add("on");
  el.innerHTML = ids.map(id => {
    const s = liveStreams[id];
    return `<div class="lhd"><span class="dot"></span>live · ${esc(s.meta.provider)} ${esc(s.meta.path || "")}</div><pre>${esc(s.text || "…")}</pre>`;
  }).join("<hr/>");
  el.scrollTop = el.scrollHeight;
}
try {
  const esrc = new EventSource("/api/stream");
  esrc.onmessage = (e) => {
    let ev; try { ev = JSON.parse(e.data); } catch { return; }
    if (ev.type === "start") { liveStreams[ev.streamId] = { meta: ev, text: "" }; renderLive(); }
    else if (ev.type === "chunk") { const s = liveStreams[ev.streamId]; if (s) { s.text += extractDelta(ev.text); renderLive(); } }
    else if (ev.type === "end") { delete liveStreams[ev.streamId]; renderLive(); refresh(); }
  };
} catch { /* SSE unavailable */ }

refresh();
</script>
