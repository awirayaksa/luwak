<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Luwak — Starting…</title>
<link rel="icon" href="/assets/favicon.ico" />
<style>
  :root {
    color-scheme: dark;
    --bg: #1B0F08; --panel: #23140C; --raised: #2C1B10; --border: #3C2618;
    --text: #F7E9D2; --muted: #9C7A57;
    --accent: #EAA53F; --accent-strong: #FFD884;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    gap: 24px;
  }
  .logo { width: 96px; height: 96px; }
  .title { font-size: 22px; font-weight: 600; letter-spacing: 0.5px; color: var(--accent-strong); }
  .status { font-size: 14px; color: var(--muted); }
  .spinner {
    width: 32px; height: 32px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error { display: none; flex-direction: column; align-items: center; gap: 16px; }
  .error .msg { font-size: 14px; color: #E5634D; max-width: 400px; text-align: center; line-height: 1.5; }
  .error .retry {
    padding: 8px 20px; background: var(--accent); color: var(--bg);
    border: none; border-radius: 6px; font-size: 14px; font-weight: 600;
    cursor: pointer; transition: background 0.2s;
  }
  .error .retry:hover { background: var(--accent-strong); }
  .error .btn-row { display: flex; gap: 12px; }
  .error .btn-secondary {
    padding: 8px 20px; background: transparent; color: var(--accent);
    border: 1px solid var(--border); border-radius: 6px; font-size: 14px; font-weight: 600;
    cursor: pointer; transition: all 0.2s;
  }
  .error .btn-secondary:hover { border-color: var(--accent); background: var(--raised); }
  .error .hint { font-size: 12px; color: var(--muted); max-width: 400px; text-align: center; line-height: 1.4; }
</style>
</head>
<body>
  <div id="loading">
    <svg class="logo" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="bg" x1="0" y1="0" x2="0.3" y2="1">
          <stop offset="0" stop-color="#3C2618"/><stop offset="1" stop-color="#23140C"/>
        </linearGradient>
        <linearGradient id="fur" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#F7E9D2"/><stop offset="1" stop-color="#E6CBA4"/>
        </linearGradient>
        <linearGradient id="muzzle" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#EFD8B6"/><stop offset="1" stop-color="#F4E3C8"/>
        </linearGradient>
        <radialGradient id="eye" cx="0.5" cy="0.38" r="0.75">
          <stop offset="0" stop-color="#FFD884"/>
          <stop offset="0.55" stop-color="#EAA53F"/>
          <stop offset="1" stop-color="#C57C20"/>
        </radialGradient>
      </defs>
      <rect x="0" y="0" width="256" height="256" rx="60" fill="url(#bg)"/>
      <path fill="url(#fur)" d="M70 54 C63 64 60 96 60 124 C60 158 66 184 84 200 C100 214 116 220 128 220 C140 220 156 214 172 200 C190 184 196 158 196 124 C196 96 193 64 186 54 C178 64 168 80 158 88 C148 82 138 80 128 80 C118 80 108 82 98 88 C88 80 78 64 70 54 Z"/>
      <path fill="#3C2618" d="M73 62 C70 74 70 86 74 94 C82 86 88 78 92 70 C86 66 79 63 73 62 Z"/>
      <path fill="#3C2618" d="M183 62 C186 74 186 86 182 94 C174 86 168 78 164 70 C170 66 177 63 183 62 Z"/>
      <path fill="#CBA77C" opacity="0.6" d="M128 86 C124 86 122 96 123 108 L133 108 C134 96 132 86 128 86 Z"/>
      <path fill="url(#muzzle)" d="M96 156 C108 150 118 148 128 148 C138 148 148 150 160 156 C158 184 144 206 128 206 C112 206 98 184 96 156 Z"/>
      <path fill="#33200F" d="M70 116 C92 102 110 100 128 100 C146 100 164 102 186 116 C184 138 175 152 159 158 C148 162 139 154 128 154 C117 154 108 162 97 158 C81 152 72 138 70 116 Z"/>
      <circle cx="103" cy="126" r="17" fill="url(#eye)"/>
      <circle cx="153" cy="126" r="17" fill="url(#eye)"/>
      <ellipse cx="103" cy="128" rx="8" ry="8.5" fill="#22100A"/>
      <ellipse cx="153" cy="128" rx="8" ry="8.5" fill="#22100A"/>
      <circle cx="108" cy="122" r="3.4" fill="#FCF4E8"/>
      <circle cx="158" cy="122" r="3.4" fill="#FCF4E8"/>
      <path fill="#33200F" d="M128 170 L139 181 C135 189 131 191 128 191 C125 191 121 189 117 181 Z"/>
    </svg>
    <div class="title">Luwak</div>
    <div class="spinner"></div>
    <div class="status">Starting proxy…</div>
  </div>
  <div id="error" class="error">
    <div class="title">Luwak</div>
    <div class="msg" id="error-msg">The proxy failed to start.</div>
    <div class="btn-row">
      <button class="retry" onclick="window.__luwakRetry()">Retry</button>
      <button class="btn-secondary" onclick="window.__luwakOpenConfig()">Open Config</button>
      <button class="btn-secondary" onclick="window.__luwakViewLogs()">View Logs</button>
    </div>
    <div class="hint" id="error-hint"></div>
  </div>
  <script>
    async function tauriInvoke(cmd) {
      if (window.__TAURI__ && window.__TAURI__.core) {
        return window.__TAURI__.core.invoke(cmd);
      }
    }

    window.__luwakShowError = function(msg) {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('error').style.display = 'flex';
      document.getElementById('error-msg').textContent = msg || 'The proxy failed to start.';
      tauriInvoke('get_proxy_info').then(function(info) {
        if (info && info.config_path) {
          document.getElementById('error-hint').textContent =
            'Config: ' + info.config_path;
        }
      }).catch(function() {});
    };
    window.__luwakRetry = function() {
      document.getElementById('error').style.display = 'none';
      document.getElementById('loading').style.display = 'flex';
      window.__luwakDesktopRetry && window.__luwakDesktopRetry();
    };
    window.__luwakOpenConfig = function() {
      tauriInvoke('open_config_file').catch(function() {
        var hint = document.getElementById('error-hint');
        hint.textContent = 'Could not open config editor. See config path above.';
      });
    };
    window.__luwakViewLogs = function() {
      tauriInvoke('open_log_file').catch(function() {
        var hint = document.getElementById('error-hint');
        hint.textContent = 'Could not open log file. Check luwak.log next to the executable.';
      });
    };
  </script>
</body>
</html>
